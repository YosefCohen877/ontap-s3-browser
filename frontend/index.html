<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONTAP S3 Browser</title>
  <meta name="description" content="Self-hosted NetApp ONTAP S3 object browser for enterprise internal environments." />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <!-- ── Top Navigation Bar ─────────────────────────────── -->
  <header class="topbar" id="topbar">
    <button class="topbar__brand" id="homeBtn" title="Go home" aria-label="Go to home view">
      <div class="topbar__logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="32" height="32" rx="8" fill="url(#brandGrad)" />
          <path d="M8 20 L16 10 L24 20" stroke="white" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <path d="M12 24 L20 24" stroke="white" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="16" cy="10" r="2" fill="white" />
          <defs>
            <linearGradient id="brandGrad" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#0ea5e9" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="topbar__title">
        <span class="topbar__name">ONTAP S3 Browser</span>
        <span class="topbar__sub" id="endpointLabel">—</span>
      </div>
    </button>

    <nav class="topbar__nav" aria-label="Main navigation">
      <button class="nav-btn" id="navBuckets" data-view="buckets" title="Buckets">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M2 5a3 3 0 013-3h10a3 3 0 013 3v1H2V5z" />
          <path fill-rule="evenodd" d="M2 8h16v9a3 3 0 01-3 3H5a3 3 0 01-3-3V8zm5 3a1 1 0 000 2h6a1 1 0 000-2H7z"
            clip-rule="evenodd" />
        </svg>
        Buckets
      </button>
      <button class="nav-btn" id="navDiag" data-view="diagnostics" title="Connection Test">
        <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
            clip-rule="evenodd" />
        </svg>
        Connection Test
      </button>
    </nav>

    <div class="topbar__actions">

      <button class="icon-btn" id="themeToggle" title="Toggle dark/light mode" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path fill-rule="evenodd"
            d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
            clip-rule="evenodd" />
        </svg>
        <svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
        </svg>
      </button>
      <div class="status-dot" id="statusDot" title="Connection status"></div>
    </div>
  </header>

  <!-- ── Main Content ───────────────────────────────────── -->
  <main class="main" id="main">

    <!-- Buckets View -->
    <section class="view" id="viewBuckets" role="region" aria-label="Bucket list" hidden>
      <div class="view__header">
        <h1 class="view__title">Buckets</h1>
        <div class="refresh-group">
          <button class="btn btn--primary btn--sm" id="createBucketBtn" title="Create bucket" hidden>
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
            Create Bucket
          </button>
          <div class="refresh-ctrl" title="Auto-refresh interval">
            <svg class="refresh-ring" viewBox="0 0 32 32" aria-hidden="true">
              <circle class="refresh-ring__track" cx="16" cy="16" r="12" />
              <circle class="refresh-ring__fill" cx="16" cy="16" r="12" />
            </svg>
            <select class="refresh-select" aria-label="Auto-refresh interval">
              <option value="0">Off</option>
              <option value="1">1s</option>
              <option value="5">5s</option>
              <option value="10">10s</option>
              <option value="30">30s</option>
              <option value="60">1m</option>
              <option value="300">5m</option>
            </select>
          </div>
          <span class="refresh-last" title="Last refreshed" hidden>—</span>
          <button class="btn btn--ghost btn--sm refresh-btn-manual" id="refreshBucketsBtn" title="Refresh">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
            </svg>
            Refresh
          </button>
        </div>
      </div>
      <div id="bucketList" class="bucket-grid" role="list" aria-live="polite">
        <!-- Populated by buckets.js -->
      </div>
    </section>

    <!-- Browser View (objects within a bucket) -->
    <section class="view" id="viewBrowser" role="region" aria-label="Object browser" hidden>
      <div class="view__header">
        <nav class="breadcrumb" id="breadcrumb" aria-label="Path navigation"></nav>
        <div class="refresh-group">
          <div class="refresh-ctrl" title="Auto-refresh interval">
            <svg class="refresh-ring" viewBox="0 0 32 32" aria-hidden="true">
              <circle class="refresh-ring__track" cx="16" cy="16" r="12" />
              <circle class="refresh-ring__fill" cx="16" cy="16" r="12" />
            </svg>
            <select class="refresh-select" aria-label="Auto-refresh interval">
              <option value="0">Off</option>
              <option value="1">1s</option>
              <option value="5">5s</option>
              <option value="10">10s</option>
              <option value="30">30s</option>
              <option value="60">1m</option>
              <option value="300">5m</option>
            </select>
          </div>
          <span class="refresh-last" title="Last refreshed" hidden>—</span>
          <button class="btn btn--ghost btn--sm refresh-btn-manual" id="refreshBrowserBtn" title="Refresh">
            <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
            </svg>
            Refresh
          </button>
        </div>
      </div>

      <div class="browser-layout">
        <!-- Left: object list -->
        <div class="browser-list-pane">
          <div class="browser-toolbar">
            <div class="search-wrap">
              <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                  clip-rule="evenodd" />
              </svg>
              <input class="search-input" id="searchInput" type="search" placeholder="Search objects…"
                aria-label="Search objects" />
            </div>
            <div id="objectCountLabel" class="object-count" aria-live="polite">—</div>
            <div class="sort-wrap">
              <label class="sr-only" for="sortSelect">Sort by</label>
              <select class="select" id="sortSelect" aria-label="Sort field">
                <option value="modified">Last Modified</option>
                <option value="name">Name</option>
                <option value="size">Size</option>
              </select>
              <button class="icon-btn sort-order-btn" id="sortOrderBtn" title="Toggle sort order"
                aria-label="Toggle sort order" data-order="asc">
                <svg class="icon-sort-asc" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path
                    d="M3 3a1 1 0 000 2h11a1 1 0 100-2H3zM3 7a1 1 0 000 2h7a1 1 0 100-2H3zM3 11a1 1 0 100 2h4a1 1 0 100-2H3zM15 7a1 1 0 10-2 0v5.586l-1.293-1.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L15 12.586V7z" />
                </svg>
                <svg class="icon-sort-desc" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"
                  style="display:none">
                  <path
                    d="M3 3a1 1 0 000 2h11a1 1 0 100-2H3zM3 7a1 1 0 000 2h7a1 1 0 100-2H3zM3 11a1 1 0 100 2h4a1 1 0 100-2H3zM15 13a1 1 0 102 0V7.414l1.293 1.293a1 1 0 001.414-1.414l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L15 7.414V13z" />
                </svg>
              </button>
              <label class="sr-only" for="pageSizeSelect">Items per page</label>
              <select class="select" id="pageSizeSelect" aria-label="Items per page">
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
            <div class="upload-wrap" id="uploadWrap" style="display:none;">
              <input type="file" id="uploadInput" multiple hidden aria-hidden="true">
              <button class="btn btn--primary btn--sm" id="uploadBtn" title="Upload files">
                <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                  <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                </svg>
                Upload
              </button>
            </div>
          </div>

          <div id="objectList" class="object-list" role="list" aria-live="polite">
            <!-- Populated by browser.js -->
          </div>
          <div class="refresh-group" style="justify-content:flex-end;">
            <button class="btn btn--ghost btn--sm" id="prevPageBtn" title="Previous page">Previous</button>
            <span class="refresh-last" id="pageLabel" style="display:inline-block;">Page 1</span>
            <button class="btn btn--ghost btn--sm" id="nextPageBtn" title="Next page">Next</button>
          </div>
        </div>

        <!-- Right: detail / preview panel -->
        <aside class="browser-detail-pane" id="detailPane" aria-label="Object details">
          <div id="detailContent" class="detail-content">
            <div class="detail-empty">
              <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect x="8" y="6" width="24" height="30" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M32 6l8 8v28a2 2 0 01-2 2H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <path d="M32 6v8h8" stroke="currentColor" stroke-width="2" />
                <path d="M16 20h12M16 26h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <p>Select an object to view details</p>
            </div>
          </div>
        </aside>
      </div>
    </section>

    <!-- Diagnostics View -->
    <section class="view" id="viewDiagnostics" role="region" aria-label="Connection diagnostics" hidden>
      <div class="view__header">
        <h1 class="view__title">Connection Test</h1>
        <button class="btn btn--primary" id="runTestBtn">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
              clip-rule="evenodd" />
          </svg>
          Run Test
        </button>
      </div>
      <div id="diagResults" class="diag-results" aria-live="polite">
        <p class="diag-idle">Click <strong>Run Test</strong> to diagnose your ONTAP S3 connection.</p>
      </div>
    </section>

  </main>

  <!-- ── Toast notification ────────────────────────────── -->
  <div class="toast-container" id="toastContainer" aria-live="assertive" aria-atomic="true"></div>

  <!-- ── Loading overlay ───────────────────────────────── -->
  <div class="loading-overlay" id="loadingOverlay" aria-hidden="true" hidden>
    <div class="spinner"></div>
  </div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/buckets.js"></script>
  <script src="/js/browser.js"></script>
  <script src="/js/preview.js"></script>
  <script src="/js/diagnostics.js"></script>
</body>

</html>
